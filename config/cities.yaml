# TomorrowLand Heat — City Registry
# All configured cities for multi-city deployment
#
# STATUS KEY:
#   active    = data pipeline complete, model trained, serving in production
#   ready     = config created, ready to run pipeline
#   planned   = on the roadmap, config not yet created
#
# To add a new city:
#   1. Create config/{slug}.yaml (copy from an existing city)
#   2. Set the bounding box, center, CRS, weather station, neighborhoods
#   3. Run: python data-pipeline/run_city.py --city {slug}
#   4. Run: python model/train_heat_model.py --city {slug}
#   5. Add entry below with status: active

cities:
  - slug: "chicago"
    name: "Chicago Metro, Illinois"
    status: "active"
    cells: 142784
    notes: "Original pilot city. Includes western suburbs through Naperville."
    climate: "humid continental"
    key_story: "15°F gap between Lincoln Park and Back of the Yards"

  - slug: "phoenix"
